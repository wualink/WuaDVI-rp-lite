name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.resolution }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        resolution: [320x240, 400x240, 640x480x1, 800x600x1]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: pio run -e rp2350_pizero_${{ matrix.resolution }}

      - name: Stage UF2 asset
        run: |
          mkdir -p dist
          cp ".pio/build/rp2350_pizero_${{ matrix.resolution }}/firmware.uf2" \
             "dist/WuaDVI-rp-lite-${{ github.ref_name }}-${{ matrix.resolution }}.uf2"

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.resolution }}
          path: dist/*.uf2

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: firmware-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.uf2
          generate_release_notes: true
