; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:rp2350_pizero]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
; Same board as WuaDVI-rp-lvgl (RP2350B, GPIOs 32-39 for HDMI)
board = rpipico2
framework = arduino
board_build.core = earlephilhower

board_upload.flash_size = 16MB
board_build.filesystem_size = 1MB

lib_deps =
    https://github.com/Caza20/PicoDVI

build_flags =
    -DPICO_PIO_USE_GPIO_BASE=1
    -Iinclude
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_RTTI
    ; ── Resolution select ───────────────────────────────────────────────────────
    ; Uncomment exactly ONE.  Must match the flag in WuaDVI-esp32-lvgl.
    ; Both are full RGB565 color (DVIGFX16):
    ;   320x240 → 150 KB framebuffer, scanned out as 640x480p60
    ;   400x240 → 192 KB framebuffer, scanned out as 800x480p60
    -DWUADVI_RES_320x240
    ; -DWUADVI_RES_400x240
    ; ── Test mode ──────────────────────────────────────────────────────────────
    ; Uncomment the line below to enable Serial (USB-CDC) framebuffer test mode.
    ; In this mode SPI is disabled; the RP2350 receives frames from the PC via
    ; USB Serial.  Use  test/send_frame.py  to send test patterns.
    ; Close any terminal monitor before running the Python script (same port).
    ; -DSERIAL_TEST

; Prevent SD/SDFS conflicts with PicoDVI's SdFat dependency
lib_ignore =
    SD
    SDFS

monitor_speed = 115200
