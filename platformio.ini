; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Shared defaults for every environment below.
[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
; Same board as WuaDVI-rp-lvgl (RP2350B, GPIOs 32-39 for HDMI)
board = rpipico2
framework = arduino
board_build.core = earlephilhower

board_upload.flash_size = 16MB
board_build.filesystem_size = 1MB

lib_deps =
    https://github.com/Caza20/PicoDVI

build_flags =
    -DPICO_PIO_USE_GPIO_BASE=1
    -Iinclude
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_RTTI
    ; ── Test mode ──────────────────────────────────────────────────────────────
    ; Uncomment the line below to enable Serial (USB-CDC) framebuffer test mode.
    ; In this mode SPI is disabled; the RP2350 receives frames from the PC via
    ; USB Serial.  Use  test/send_frame.py  to send test patterns.
    ; Close any terminal monitor before running the Python script (same port).
    ; -DSERIAL_TEST

; Prevent SD/SDFS conflicts with PicoDVI's SdFat dependency
lib_ignore =
    SD
    SDFS

monitor_speed = 115200

; ── Resolution-specific environments ─────────────────────────────────────────
; One env per resolution — no need to edit build_flags by hand anymore.
; Pick the one matching WuaDVI-esp32-lvgl's active -DWUADVI_RES_* flag:
;   320x240   → RGB565, 150 KB framebuffer, scanned out as 640x480p60
;   400x240   → RGB565, 192 KB framebuffer, scanned out as 800x480p60
;   640x480x1 → 1-bit monochrome, 37.5 KB framebuffer, native 640x480p60
;   800x600x1 → 1-bit monochrome, 58.6 KB framebuffer, native 800x600p60
;               reduced blanking.  354 MHz sysclock @ 1.30 V — the hardest
;               overclock of the set; some older monitors reject the
;               reduced-blanking timing.

[env:rp2350_pizero_320x240]
build_flags = ${env.build_flags} -DWUADVI_RES_320x240

[env:rp2350_pizero_400x240]
build_flags = ${env.build_flags} -DWUADVI_RES_400x240

[env:rp2350_pizero_640x480x1]
build_flags = ${env.build_flags} -DWUADVI_RES_640x480x1

[env:rp2350_pizero_800x600x1]
build_flags = ${env.build_flags} -DWUADVI_RES_800x600x1
